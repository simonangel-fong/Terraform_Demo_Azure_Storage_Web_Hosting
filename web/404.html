<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Not Found</title>
    <style>
      :root {
        --bg: #0b1220;
        --fg: #e6edf3;
        --muted: #8b949e;
        --accent: #f85149;
        --card: #161b22;
        --border: #30363d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
      }
      main {
        max-width: 480px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2.5rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      }
      .code {
        font-size: 4rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        letter-spacing: -0.01em;
      }
      p { color: var(--muted); line-height: 1.6; margin: 0.5rem 0; }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        color: var(--fg);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        transition: background 0.15s;
      }
      a:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist on this static site.</p>
      <a href="/">← Back to home</a>
    </main>
  </body>
</html>
