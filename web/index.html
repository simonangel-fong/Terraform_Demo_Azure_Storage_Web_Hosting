<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terraform + Azure Storage Static Site</title>
  <style>
    :root {
      --bg: #0b1220;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --card: #161b22;
      --border: #30363d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    main {
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
    }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.3);
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0.5rem 0;
    }

    code {
      background: rgba(255, 255, 255, 0.06);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main>
    <span class="tag">Azure Blob Storage · Static Website</span>
    <h1>Hello from Terraform</h1>
    <p>
      This page is served from the <code>$web</code> container of an Azure
      Storage Account, provisioned and deployed entirely via Terraform.
    </p>
    <footer>Terraform Demo · Azure Storage Web Hosting</footer>
  </main>
</body>

</html>
