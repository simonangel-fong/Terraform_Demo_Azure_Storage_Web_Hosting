name: deploy

on:
  push:
    branches: [master]
    paths:
      - "infra/**"
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # required for Azure OIDC
  contents: read

env:
  TF_VERSION: "1.9.8"
  TF_IN_AUTOMATION: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: "true"

jobs:
  terraform:
    name: terraform apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=demo-storage-web-hosting/dev/tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      # - name: Terraform fmt
      #   run: terraform fmt -check -recursive

      # - name: Terraform validate
      #   run: terraform validate

      # - name: Terraform plan
      #   run: terraform plan -out=tfplan -input=false

      # - name: Terraform apply
      #   run: terraform apply -auto-approve -input=false tfplan
